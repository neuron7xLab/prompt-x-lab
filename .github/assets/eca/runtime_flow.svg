<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1000" viewBox="0 0 1200 1000">
<rect width="100%" height="100%" fill="#ffffff"/>
<text x="600" y="55" font-family="Arial" font-size="30" text-anchor="middle" font-weight="bold">Runtime Flow — Cognitive Engine v1.0</text>

<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
  </marker>
</defs>

<rect x="430" y="95" width="340" height="70" rx="14" fill="#1f2937"/>
<text x="600" y="138" fill="white" font-family="Arial" font-size="23" text-anchor="middle">Incoming Request</text>

<rect x="420" y="220" width="360" height="85" rx="14" fill="#eef2ff" stroke="#5b5fc7"/>
<text x="600" y="255" font-family="Arial" font-size="22" text-anchor="middle" font-weight="bold">Task Extraction</text>
<text x="600" y="283" font-family="Arial" font-size="15" text-anchor="middle">Objective • Constraints • Risks • Output Need</text>

<rect x="420" y="355" width="360" height="85" rx="14" fill="#eef8e8" stroke="#3f7f3f"/>
<text x="600" y="390" font-family="Arial" font-size="22" text-anchor="middle" font-weight="bold">Router</text>
<text x="600" y="418" font-family="Arial" font-size="15" text-anchor="middle">Select Mode • Dual Output if Needed</text>

<polygon points="600,485 760,555 600,625 440,555" fill="#fff4dd" stroke="#a67c00"/>
<text x="600" y="550" font-family="Arial" font-size="22" text-anchor="middle" font-weight="bold">Human-factor relevant?</text>
<text x="600" y="580" font-family="Arial" font-size="15" text-anchor="middle">Sleep • Stress • Learning • Fatigue • Behavior</text>

<rect x="130" y="690" width="360" height="95" rx="14" fill="#f3f4f6" stroke="#4b5563"/>
<text x="310" y="728" font-family="Arial" font-size="22" text-anchor="middle" font-weight="bold">Neurobiological Layer</text>
<text x="310" y="756" font-family="Arial" font-size="15" text-anchor="middle">Mechanisms • Proof Tiers • Constraints</text>

<rect x="710" y="690" width="360" height="95" rx="14" fill="#f3f4f6" stroke="#4b5563"/>
<text x="890" y="728" font-family="Arial" font-size="22" text-anchor="middle" font-weight="bold">System Design Layer</text>
<text x="890" y="756" font-family="Arial" font-size="15" text-anchor="middle">Modules • Rules • Metrics • Failure Modes</text>

<rect x="420" y="860" width="360" height="85" rx="14" fill="#fde9ea" stroke="#b35252"/>
<text x="600" y="895" font-family="Arial" font-size="22" text-anchor="middle" font-weight="bold">Quality Gate + Output</text>
<text x="600" y="923" font-family="Arial" font-size="15" text-anchor="middle">Coherence • Density • Leap Check • Compliance</text>

<line x1="600" y1="165" x2="600" y2="220" stroke="#555" stroke-width="3" marker-end="url(#arrow)"/>
<line x1="600" y1="305" x2="600" y2="355" stroke="#555" stroke-width="3" marker-end="url(#arrow)"/>
<line x1="600" y1="440" x2="600" y2="485" stroke="#555" stroke-width="3" marker-end="url(#arrow)"/>

<line x1="440" y1="555" x2="310" y2="690" stroke="#555" stroke-width="3" marker-end="url(#arrow)"/>
<text x="390" y="635" font-family="Arial" font-size="16" text-anchor="middle">Yes</text>

<line x1="760" y1="555" x2="890" y2="690" stroke="#555" stroke-width="3" marker-end="url(#arrow)"/>
<text x="820" y="635" font-family="Arial" font-size="16" text-anchor="middle">No / Mixed</text>

<line x1="310" y1="785" x2="520" y2="860" stroke="#555" stroke-width="3" marker-end="url(#arrow)"/>
<line x1="890" y1="785" x2="680" y2="860" stroke="#555" stroke-width="3" marker-end="url(#arrow)"/>
</svg>