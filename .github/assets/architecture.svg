<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid meet" role="img" aria-label="prompt-x-lab eight-layer cognitive architecture">
  <title>prompt-x-lab — eight-layer cognitive architecture</title>
  <desc>Stacked layer diagram showing the eight-layer architecture: foundation primitives, cognition scaffolds, engineering modules, interactive personas, validation gates, orchestration systems, ECA cognitive engine, Kriterion fail-closed kernel. Dependencies flow upward; integrations are shown on the right.</desc>

  <defs>
    <linearGradient id="layerG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00FF00" stop-opacity="0"/>
      <stop offset="25%" stop-color="#00FF00" stop-opacity="0.85"/>
      <stop offset="50%" stop-color="#0000FF" stop-opacity="1"/>
      <stop offset="75%" stop-color="#FF0000" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#FF0000" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="titleG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00FF00">
        <animate attributeName="stop-color" values="#00FF00;#0000FF;#FF0000;#00FF00" dur="12s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#0000FF">
        <animate attributeName="stop-color" values="#0000FF;#FF0000;#00FF00;#0000FF" dur="12s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#FF0000">
        <animate attributeName="stop-color" values="#FF0000;#00FF00;#0000FF;#FF0000" dur="12s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="#000000"/>

  <!-- Header -->
  <text x="800" y="70" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="34" font-weight="800" fill="url(#titleG)" letter-spacing="6" filter="url(#soft)">p r o m p t   x   l a b</text>
  <text x="800" y="105" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="13" fill="#666666" letter-spacing="4">eight-layer cognitive architecture  ·  typed harness  ·  fail-closed by construction</text>
  <line x1="400" y1="130" x2="1200" y2="130" stroke="url(#layerG)" stroke-width="1"/>

  <!-- Layer bars. Each is a 1000×52 rounded bar at y = 160 + i*70 -->
  <!-- Level 07 — Kriterion (top, highest) -->
  <g transform="translate(300 155)">
    <rect width="1000" height="52" rx="6" fill="#0a0a0a" stroke="#00FF00" stroke-width="0.8" stroke-opacity="0.4"/>
    <text x="20" y="33" font-family="'JetBrains Mono',monospace" font-size="14" font-weight="800" fill="#00FF00" letter-spacing="2">07 · KRITERION</text>
    <text x="240" y="22" font-family="'JetBrains Mono',monospace" font-size="10" fill="#999999" letter-spacing="1">canonical primitive  ·  execution chain  ·  6 protocols  ·  9 schemas</text>
    <text x="240" y="40" font-family="'JetBrains Mono',monospace" font-size="9"  fill="#666666" letter-spacing="1">fail-closed kernel  ·  180 LOC stdlib-only  ·  10/10 reproduction  ·  MIT</text>
    <text x="960" y="33" text-anchor="end" font-family="'JetBrains Mono',monospace" font-size="14" font-weight="800" fill="#00FF00">18</text>
  </g>

  <!-- Level 06 — ECA -->
  <g transform="translate(300 225)">
    <rect width="1000" height="52" rx="6" fill="#0a0a0a" stroke="#0000FF" stroke-width="0.8" stroke-opacity="0.5"/>
    <text x="20" y="33" font-family="'JetBrains Mono',monospace" font-size="14" font-weight="800" fill="#0000FF" letter-spacing="2">06 · ECA ENGINE</text>
    <text x="240" y="22" font-family="'JetBrains Mono',monospace" font-size="10" fill="#999999" letter-spacing="1">system prompt  ·  router  ·  scorer  ·  runtime  ·  signer</text>
    <text x="240" y="40" font-family="'JetBrains Mono',monospace" font-size="9"  fill="#666666" letter-spacing="1">typed Python port  ·  77-iter calibrated  ·  router 99.44%  ·  scorer 90.62%  ·  FP=0</text>
    <text x="960" y="33" text-anchor="end" font-family="'JetBrains Mono',monospace" font-size="14" font-weight="800" fill="#0000FF">34</text>
  </g>

  <!-- Level 05 — Orchestration -->
  <g transform="translate(300 295)">
    <rect width="1000" height="52" rx="6" fill="#0a0a0a" stroke="#FF0000" stroke-width="0.8" stroke-opacity="0.5"/>
    <text x="20" y="33" font-family="'JetBrains Mono',monospace" font-size="14" font-weight="800" fill="#FF0000" letter-spacing="2">05 · ORCHESTRATION</text>
    <text x="240" y="22" font-family="'JetBrains Mono',monospace" font-size="10" fill="#999999" letter-spacing="1">protocols  ·  agents  ·  frameworks  ·  crypto  ·  research</text>
    <text x="240" y="40" font-family="'JetBrains Mono',monospace" font-size="9"  fill="#666666" letter-spacing="1">26 long-form production systems  ·  verbatim from upstream  ·  SHA-256 audit</text>
    <text x="960" y="33" text-anchor="end" font-family="'JetBrains Mono',monospace" font-size="14" font-weight="800" fill="#FF0000">26</text>
  </g>

  <!-- Level 04 — Validation -->
  <g transform="translate(300 365)">
    <rect width="1000" height="52" rx="6" fill="#0a0a0a" stroke="#FF0000" stroke-width="0.6" stroke-opacity="0.55"/>
    <text x="20" y="33" font-family="'JetBrains Mono',monospace" font-size="14" font-weight="800" fill="#FF0000" letter-spacing="2">04 · VALIDATION</text>
    <text x="240" y="33" font-family="'JetBrains Mono',monospace" font-size="10" fill="#999999" letter-spacing="1">hallucination gate  ·  logical-fallacy checker  ·  closed-taxonomy enforcement</text>
    <text x="960" y="33" text-anchor="end" font-family="'JetBrains Mono',monospace" font-size="14" font-weight="800" fill="#FF0000">2</text>
  </g>

  <!-- Level 03 — Personas -->
  <g transform="translate(300 435)">
    <rect width="1000" height="52" rx="6" fill="#0a0a0a" stroke="#00FF00" stroke-width="0.6" stroke-opacity="0.55"/>
    <text x="20" y="33" font-family="'JetBrains Mono',monospace" font-size="14" font-weight="800" fill="#00FF00" letter-spacing="2">03 · PERSONAS</text>
    <text x="240" y="33" font-family="'JetBrains Mono',monospace" font-size="10" fill="#999999" letter-spacing="1">socratic tutor  ·  strategic advisor  ·  one-sentence discipline</text>
    <text x="960" y="33" text-anchor="end" font-family="'JetBrains Mono',monospace" font-size="14" font-weight="800" fill="#00FF00">2</text>
  </g>

  <!-- Level 02 — Engineering -->
  <g transform="translate(300 505)">
    <rect width="1000" height="52" rx="6" fill="#0a0a0a" stroke="#0000FF" stroke-width="0.6" stroke-opacity="0.55"/>
    <text x="20" y="33" font-family="'JetBrains Mono',monospace" font-size="14" font-weight="800" fill="#0000FF" letter-spacing="2">02 · ENGINEERING</text>
    <text x="240" y="33" font-family="'JetBrains Mono',monospace" font-size="10" fill="#999999" letter-spacing="1">senior code reviewer  ·  legacy refactor expert  ·  property-test generator</text>
    <text x="960" y="33" text-anchor="end" font-family="'JetBrains Mono',monospace" font-size="14" font-weight="800" fill="#0000FF">3</text>
  </g>

  <!-- Level 01 — Cognition -->
  <g transform="translate(300 575)">
    <rect width="1000" height="52" rx="6" fill="#0a0a0a" stroke="#00FF00" stroke-width="0.6" stroke-opacity="0.55"/>
    <text x="20" y="33" font-family="'JetBrains Mono',monospace" font-size="14" font-weight="800" fill="#00FF00" letter-spacing="2">01 · COGNITION</text>
    <text x="240" y="33" font-family="'JetBrains Mono',monospace" font-size="10" fill="#999999" letter-spacing="1">executive engine  ·  creator-critic-verifier triad  ·  typed chain-of-thought</text>
    <text x="960" y="33" text-anchor="end" font-family="'JetBrains Mono',monospace" font-size="14" font-weight="800" fill="#00FF00">3</text>
  </g>

  <!-- Level 00 — Foundation -->
  <g transform="translate(300 645)">
    <rect width="1000" height="52" rx="6" fill="#0a0a0a" stroke="#FF0000" stroke-width="0.6" stroke-opacity="0.55"/>
    <text x="20" y="33" font-family="'JetBrains Mono',monospace" font-size="14" font-weight="800" fill="#FF0000" letter-spacing="2">00 · FOUNDATION</text>
    <text x="240" y="33" font-family="'JetBrains Mono',monospace" font-size="10" fill="#999999" letter-spacing="1">identity primitive  ·  constraint primitive  ·  output primitive</text>
    <text x="960" y="33" text-anchor="end" font-family="'JetBrains Mono',monospace" font-size="14" font-weight="800" fill="#FF0000">3</text>
  </g>

  <!-- Left-side "the model" base -->
  <g transform="translate(300 720)">
    <line x1="0" y1="0" x2="1000" y2="0" stroke="url(#layerG)" stroke-width="1"/>
    <text x="500" y="22" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="11" fill="#666666" letter-spacing="3">the model  ·  claude  ·  gpt  ·  llama  ·  ollama</text>
  </g>

  <!-- Upward dependency arrows (thin, on the left edge) -->
  <g stroke="#333333" stroke-width="1" fill="none" opacity="0.85">
    <path d="M 280 720 L 280 155" stroke-dasharray="2,3"/>
    <!-- Arrow head at top -->
    <path d="M 275 165 L 280 155 L 285 165" stroke="#666666"/>
  </g>
  <text x="260" y="450" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="10" fill="#666666" letter-spacing="1" transform="rotate(-90 260 450)">depends on  ·  composes upward</text>

  <!-- Right-side integration tier annotation -->
  <g transform="translate(1320 155)">
    <rect x="0" y="0" width="240" height="612" rx="6" fill="#050505" stroke="#222222" stroke-width="0.8"/>

    <text x="120" y="28" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="12" font-weight="700" fill="#aaaaaa" letter-spacing="3">INTEGRATION TIER</text>
    <line x1="20" y1="42" x2="220" y2="42" stroke="#222222"/>

    <!-- Native -->
    <text x="20" y="80" font-family="'JetBrains Mono',monospace" font-size="10" fill="#00FF00" font-weight="700" letter-spacing="1">NATIVE PORT</text>
    <text x="20" y="98" font-family="'JetBrains Mono',monospace" font-size="9" fill="#999999">07 · Kriterion kernel</text>
    <text x="20" y="114" font-family="'JetBrains Mono',monospace" font-size="9" fill="#999999">06 · ECA typed subsystem</text>
    <text x="20" y="132" font-family="'JetBrains Mono',monospace" font-size="8" fill="#555555">mypy strict  ·  reproduction tests</text>

    <!-- Verbatim -->
    <text x="20" y="170" font-family="'JetBrains Mono',monospace" font-size="10" fill="#FF0000" font-weight="700" letter-spacing="1">VERBATIM COPY</text>
    <text x="20" y="188" font-family="'JetBrains Mono',monospace" font-size="9" fill="#999999">05 · Advanced Orchestration</text>
    <text x="20" y="206" font-family="'JetBrains Mono',monospace" font-size="8" fill="#555555">SHA-256 body audit  ·  immutable</text>

    <!-- Hand-written -->
    <text x="20" y="242" font-family="'JetBrains Mono',monospace" font-size="10" fill="#0000FF" font-weight="700" letter-spacing="1">HAND-WRITTEN</text>
    <text x="20" y="260" font-family="'JetBrains Mono',monospace" font-size="9" fill="#999999">00 · 01 · 02 · 03 · 04</text>
    <text x="20" y="276" font-family="'JetBrains Mono',monospace" font-size="8" fill="#555555">13 seed modules  ·  rubric-tested</text>

    <line x1="20" y1="302" x2="220" y2="302" stroke="#222222"/>

    <!-- Stats -->
    <text x="120" y="330" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="11" fill="#aaaaaa" font-weight="700" letter-spacing="2">REPO STATS</text>
    <line x1="20" y1="344" x2="220" y2="344" stroke="#222222"/>

    <g font-family="'JetBrains Mono',monospace" font-size="9">
      <text x="20" y="368" fill="#666666">layers</text>
      <text x="220" y="368" text-anchor="end" fill="#00FF00" font-weight="700">8</text>

      <text x="20" y="386" fill="#666666">total modules</text>
      <text x="220" y="386" text-anchor="end" fill="#00FF00" font-weight="700">91</text>

      <text x="20" y="404" fill="#666666">pytest tests</text>
      <text x="220" y="404" text-anchor="end" fill="#00FF00" font-weight="700">117</text>

      <text x="20" y="422" fill="#666666">mypy strict files</text>
      <text x="220" y="422" text-anchor="end" fill="#0000FF" font-weight="700">27</text>

      <text x="20" y="440" fill="#666666">coverage</text>
      <text x="220" y="440" text-anchor="end" fill="#0000FF" font-weight="700">71.7%</text>

      <text x="20" y="458" fill="#666666">audit layers</text>
      <text x="220" y="458" text-anchor="end" fill="#FF0000" font-weight="700">3</text>

      <text x="20" y="476" fill="#666666">audit entries</text>
      <text x="220" y="476" text-anchor="end" fill="#FF0000" font-weight="700">78</text>
    </g>

    <line x1="20" y1="500" x2="220" y2="500" stroke="#222222"/>

    <!-- Speed -->
    <text x="120" y="526" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="11" fill="#aaaaaa" font-weight="700" letter-spacing="2">SPEED</text>
    <line x1="20" y1="540" x2="220" y2="540" stroke="#222222"/>

    <g font-family="'JetBrains Mono',monospace" font-size="9">
      <text x="20" y="564" fill="#666666">sha256_hex (64B)</text>
      <text x="220" y="564" text-anchor="end" fill="#00FF00">486 ns</text>

      <text x="20" y="582" fill="#666666">build_step_hash</text>
      <text x="220" y="582" text-anchor="end" fill="#00FF00">4.0 μs</text>

      <text x="20" y="600" fill="#666666">full 7-phase chain</text>
      <text x="220" y="600" text-anchor="end" fill="#0000FF">189 μs</text>
    </g>
  </g>

  <!-- Footer -->
  <line x1="300" y1="800" x2="1300" y2="800" stroke="url(#layerG)" stroke-width="1"/>
  <text x="800" y="828" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="11" fill="#666666" letter-spacing="3">one module · one job · one test · one refusal path  ·  MIT  ·  Ukraine</text>
  <text x="800" y="855" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="9" fill="#444444" letter-spacing="2">v0.7.0  ·  production / stable  ·  github.com/neuron7xLab/prompt-x-lab</text>
</svg>
