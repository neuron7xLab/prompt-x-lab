<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 24" preserveAspectRatio="xMidYMid meet" role="img" aria-label="divider">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00FF00" stop-opacity="0"/>
      <stop offset="25%" stop-color="#00FF00" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#0000FF" stop-opacity="1"/>
      <stop offset="75%" stop-color="#FF0000" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FF0000" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <line x1="0" y1="12" x2="470" y2="12" stroke="url(#g)" stroke-width="1"/>
  <line x1="530" y1="12" x2="1000" y2="12" stroke="url(#g)" stroke-width="1"/>

  <g>
    <circle cx="484" cy="12" r="2.5" fill="#00FF00">
      <animate attributeName="opacity" values="0.35;1;0.35" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="500" cy="12" r="2.5" fill="#0000FF">
      <animate attributeName="opacity" values="0.35;1;0.35" dur="3s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="516" cy="12" r="2.5" fill="#FF0000">
      <animate attributeName="opacity" values="0.35;1;0.35" dur="3s" begin="2s" repeatCount="indefinite"/>
    </circle>
