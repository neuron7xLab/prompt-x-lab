<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 40" preserveAspectRatio="xMidYMid meet" role="img" aria-label="divider">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0"/>
      <stop offset="25%" stop-color="#8b5cf6" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="#c4b5fd" stop-opacity="1"/>
      <stop offset="75%" stop-color="#8b5cf6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2"/></filter>
  </defs>
  <line x1="0" y1="20" x2="460" y2="20" stroke="url(#g)" stroke-width="1"/>
  <line x1="540" y1="20" x2="1000" y2="20" stroke="url(#g)" stroke-width="1"/>

  <g transform="translate(500 20)">
    <circle r="3.5" fill="#c4b5fd" opacity="0.35" filter="url(#glow)"/>
    <g fill="#f0c420">
      <rect x="-14" y="-3" width="6" height="6" transform="rotate(45 -11 0)" opacity="0.85">
        <animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite"/>
      </rect>
      <rect x="8" y="-3" width="6" height="6" transform="rotate(45 11 0)" opacity="0.85">
        <animate attributeName="opacity" values="1;0.3;1" dur="3s" repeatCount="indefinite"/>
      </rect>
    </g>
    <text text-anchor="middle" y="4" font-family="'JetBrains Mono',monospace" font-size="14" font-weight="700" fill="#c4b5fd" letter-spacing="2">✕</text>
  </g>
</svg>
