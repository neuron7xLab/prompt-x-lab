<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 440" preserveAspectRatio="xMidYMid meet" role="img" aria-label="prompt x lab">
  <title>prompt x lab</title>
  <defs>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00FF00">
        <animate attributeName="stop-color" values="#00FF00;#0000FF;#FF0000;#00FF00" dur="9s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#0000FF">
        <animate attributeName="stop-color" values="#0000FF;#FF0000;#00FF00;#0000FF" dur="9s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#FF0000">
        <animate attributeName="stop-color" values="#FF0000;#00FF00;#0000FF;#FF0000" dur="9s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="div" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00FF00" stop-opacity="0"/>
      <stop offset="25%" stop-color="#00FF00" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#0000FF" stop-opacity="1"/>
      <stop offset="75%" stop-color="#FF0000" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FF0000" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="440" fill="#000000"/>

  <!-- top divider -->
  <line x1="400" y1="140" x2="1200" y2="140" stroke="url(#div)" stroke-width="1"/>

  <!-- title -->
  <text x="800" y="258" text-anchor="middle" font-family="'JetBrains Mono','Fira Code',ui-monospace,monospace" font-size="108" font-weight="800" fill="url(#title)" letter-spacing="14">prompt x lab</text>

  <!-- subtitle -->
  <text x="800" y="306" text-anchor="middle" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="15" fill="#666666" letter-spacing="8">cognitive library  ·  text-only  ·  composable  ·  falsifiable</text>

  <!-- bottom divider -->
  <line x1="400" y1="340" x2="1200" y2="340" stroke="url(#div)" stroke-width="1"/>

  <!-- three symmetric RGB dots -->
  <g>
    <circle cx="776" cy="388" r="4" fill="#00FF00">
      <animate attributeName="opacity" values="0.35;1;0.35" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="800" cy="388" r="4" fill="#0000FF">
      <animate attributeName="opacity" values="0.35;1;0.35" dur="3s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="824" cy="388" r="4" fill="#FF0000">
      <animate attributeName="opacity" values="0.35;1;0.35" dur="3s" begin="2s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
