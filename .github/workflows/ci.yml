name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: validate · test · lint · audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('pyproject.toml') }}

      - name: Install (dev + eval extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev,eval]'

      - name: Frontmatter validation (every module)
        run: pxl-validate

      - name: Pytest
        run: pytest -q

      - name: Ruff check
        run: ruff check src scripts evals tests

      - name: Mypy --strict (src only)
        run: mypy src

      - name: Layer 05 integrity audit
        run: python -m pxl.audit verify

      - name: Eval specs schema check
        run: |
          python -c "
          import sys, yaml
          from pathlib import Path
          from pxl.models import EvalSpec
          ok = 0
          for p in sorted(Path('evals/specs').glob('*.yaml')):
              EvalSpec.model_validate(yaml.safe_load(p.read_text()))
              ok += 1
          print(f'OK: {ok} eval specs valid')
          "

  eval-mock:
    name: eval · mock (no API keys)
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -e '.[eval]'
      - run: pxl-eval --provider mock --judge-provider mock || true
      - run: pxl-badges || true
      - uses: actions/upload-artifact@v7
        with:
          name: eval-mock-results
          path: evals/results/
          retention-days: 7
