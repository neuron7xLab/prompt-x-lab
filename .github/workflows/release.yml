  # publish-pypi:
  #   name: publish to pypi
  #   needs: build
  #   runs-on: ubuntu-latest
  #   environment:
  #     name: pypi
  #     url: https://pypi.org/project/prompt-x-lab/
  #   steps:
  #     - uses: actions/download-artifact@v8
  #       with:
  #         name: distributions
  #         path: dist/
  #     - name: Publish to PyPI
  #       uses: pypa/gh-action-pypi-publish@release/v1
  #       with:
  #         skip-existing: true
