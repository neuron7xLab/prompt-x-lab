name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write  # PyPI trusted publishing (OIDC)

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: build wheel + sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build backend
        run: |
          python -m pip install --upgrade pip
          pip install hatch build

      - name: Verify version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(python -c "import tomllib; print(tomllib.loads(open('pyproject.toml','rb').read().decode())['project']['version'])")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match pyproject version $PKG_VERSION"
            exit 1
          fi

      - name: Build distributions
        run: python -m build

      - name: Compute SHA-256 checksums
        run: |
          cd dist
          sha256sum *.whl *.tar.gz > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: distributions
          path: |
            dist/*.whl
            dist/*.tar.gz
            dist/SHA256SUMS.txt
          retention-days: 30

  release-github:
    name: publish github release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          name: distributions
          path: dist/

      - name: Extract changelog entry
        id: changelog
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="$TAG_VERSION" '
            $0 ~ "^## \\[" ver "\\]" { flag=1; next }
            flag && /^## \[/ { exit }
            flag { print }
          ' CHANGELOG.md > release_notes.md
          echo "Release notes for $TAG_VERSION:"
          cat release_notes.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/SHA256SUMS.txt
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-alpha') || contains(github.ref, '-beta') }}

  # Trusted publishing to PyPI is disabled by default — uncomment once
  # the project is registered on PyPI and the OIDC trust relationship is
  # configured in the PyPI project settings. Do NOT add an API token
  # secret; trusted publishing via OIDC is the correct mechanism.
